name: Daily AI Research Digest

on:
  schedule:
    # 每天 UTC 0:00 = 北京时间 8:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch papers
        run: python scripts/fetch_papers.py

      - name: Generate report
        run: python scripts/generate_report.py

      - name: Commit and push
        run: |
          git config user.name "Bro 🤖"
          git config user.email "bro@ai-daily.bot"
          git add content/ data/
          git diff --staged --quiet || (git commit -m "📰 Daily digest $(date +%Y-%m-%d)" && git push)
