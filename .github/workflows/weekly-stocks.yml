name: Weekly Stock Screening

on:
  schedule:
    # 每周一 UTC 0:00 (北京时间 8:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance numpy

      - name: Run stock screener
        run: python scripts/stock_screener.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Generate Hugo report
        run: python scripts/generate_stock_report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          WEEK=$(date +%Y-W%V)
          git add data/stocks/ content/stock-picks/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 Weekly stock picks: ${WEEK}"
          git push
